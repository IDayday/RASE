name: rase
channels:
  - conda-forge
dependencies:
  - python=3.8
  - pip
  - git
  - cmake
  - patchelf
  - glew
  - mesalib
  - osmesa
  - pip:
      # CUDA wheel chosen for RTX 3090 + CUDA 11.8/driver-compatible Docker images.
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.1.2+cu118
      - torchvision==0.16.2+cu118
      - torchaudio==2.1.2+cu118
      - numpy==1.23.5
      - scipy==1.10.1
      - pandas==2.0.3
      - matplotlib==3.7.5
      - tqdm==4.66.5
      - pyyaml==6.0.2
      - Cython<3
      - gym==0.23.1
      - mujoco-py<2.2,>=2.1
      - git+https://github.com/Farama-Foundation/d4rl@master#egg=d4rl
