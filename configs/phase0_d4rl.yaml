# RASE Phase-0/1 diagnostics on D4RL.
# Phase-0: candidate-pool selection optimism and FQE false-positive proxy.
# Phase-0.5: short-rollout validation of the FQE proxy.
# Phase-1: cross-fitted critics and proxy-alignment diagnostics.
env_name: halfcheetah-medium-replay-v2
seed: 0
device: cuda:0
out_dir: outputs/rase_phase0_v5
normalize_obs: true
force_retrain: false
# tanh is the audited default. Use --policy_squash auto to preserve legacy clip checkpoints.
policy_squash: tanh

batch_size: 256
eval_batch_size: 512
log_every: 1000

iql_steps: 200000
bc_steps: 100000
fqe_steps: 200000

candidate_ms: [1, 4, 16, 64, 256]
n_eval_states: 4096
candidate_source: bc  # bc | iql | random | perturb
perturb_std: 0.1

# RASE-v1 toy conservative score: Z = pairwise_predicted_gap - lambda * behavior_NLL.
rase_lambda_support: 0.05
thresholds: [-5, -2, -1, -0.5, 0, 0.5, 1, 2, 5]

iql:
  gamma: 0.99
  tau: 0.005
  expectile: 0.7
  beta: 3.0
  exp_adv_max: 100.0
  lr: 0.0003
  hidden_dim: 256

bc:
  lr: 0.0003
  hidden_dim: 256

fqe:
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  hidden_dim: 256

# Phase-0.5: simulator label validation. Keep small by default.
rollout_diagnostic:
  candidate_ms: [1, 16, 64, 256]
  n_eval_states: 256
  batch_size: 256
  rollout_horizon: 50
  rollout_repeats: 3
  gamma: 0.99
  max_pairs_per_m: 128
  only_pred_positive: true
  continuation_policy: iql       # iql | bc
  deterministic_continuation: true

# Phase-1: out-of-fold critic diagnostic.
crossfit:
  num_folds: 3
  fold_iql_steps: 100000
  fold_fqe_steps: 100000
  train_fqe: false
  heldout_eval_states: 2048
  candidate_ms: [1, 4, 16, 64, 256]

# Phase-1/2: proxy alignment and calibrated risk-coverage.
proxy:
  knn_ref_size: 20000
  knn_batch_size: 512
  obs_scale: 1.0
  action_scale: 1.0
  coverages: [0.2, 0.3, 0.5, 0.7]
  composite_lambda_support: 0.05
  composite_lambda_iql_dis: 0.10
  composite_lambda_fqe_dis: 0.10
  composite_lambda_knn: 0.10
